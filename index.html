<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script src="jspsych.js"></script>
  <script src="plugin-html-keyboard-response.js"></script>
  <script src="plugin-survey-html-form.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<body>

<script>
// =============================================================================
// FIREBASE CONFIGURATION
// =============================================================================
const firebaseConfig = {
  apiKey: "AIzaSyAFbUJEGKxMEX-RWPo2rHISCWjLx0xQjQM",
  authDomain: "cognitive-tasks-study1.firebaseapp.com",
  projectId: "cognitive-tasks-study1",
  storageBucket: "cognitive-tasks-study1.firebasestorage.app",
  messagingSenderId: "855820538945",
  appId: "1:855820538945:web:75f71a5545c0ea3472e2c0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =============================================================================
// TASK CONFIGURATION
// =============================================================================

// N-BACK TASK CONFIGURATION
const NBACK_LETTERS = ['A', 'B', 'C', 'D', 'E', 'H', 'I', 'K', 'L', 'M', 'O', 'P', 'R', 'S', 'T'];
const NBACK_STIMULUS_MS = 500;
const NBACK_ITI_MS = 2500;
const NBACK_MATCH_CHANCE = 3;
const NBACK_TRIALS_PER_BLOCK = 25;
const NBACK_BLOCKS = ['training', 'real1', 'real2'];

// IGT TASK CONFIGURATION
const IGT_TRIALS = 100;
const IGT_INITIAL_BANK = 2000;

// =============================================================================
// STATE
// =============================================================================
let participantInfo = {};
let nbackData = [];
let igtData = [];
let nbackTrialCount = 0;
let nback1 = null;
let nback2 = null;

// =============================================================================
// N-BACK TASK
// =============================================================================
function makeNbackTrial(blockType, trialIndex) {
  nbackTrialCount++;
  const isMatchTrial = (Math.floor(Math.random() * NBACK_MATCH_CHANCE) === 0) && (nbackTrialCount > 2);
  let currentLetter;
  let requiredResponse = 0;
  
  if (isMatchTrial) {
    currentLetter = nback2;
    requiredResponse = 1;
  } else {
    do {
      currentLetter = NBACK_LETTERS[Math.floor(Math.random() * NBACK_LETTERS.length)];
    } while (currentLetter === nback2);
    requiredResponse = 0;
  }
  
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      return `<div style="font-size:120px;font-weight:bold;color:#000;">${currentLetter}</div>`;
    },
    choices: ['m', 'M'],
    response_ends_trial: false,
    trial_duration: NBACK_STIMULUS_MS + NBACK_ITI_MS,
    on_start: function() {
      this.startTime = performance.now();
    },
    on_finish: function(data) {
      const endTime = performance.now();
      const keyPressed = data.key_press !== null ? String.fromCharCode(data.key_press).toLowerCase() : null;
      const reactionTime = data.rt;
      
      let score = 0;
      let match = 0;
      let miss = 0;
      let falseAlarm = 0;
      
      if (requiredResponse === 1) {
        if (keyPressed === 'm') {
          score = 1;
          match = 1;
        } else {
          miss = 1;
        }
      } else {
        if (keyPressed === 'm') {
          falseAlarm = 1;
        } else {
          score = 1;
        }
      }
      
      nback1 = nback2;
      nback2 = currentLetter;
      
      nbackData.push({
        participant: participantInfo.participant || 'unknown',
        session: participantInfo.session || '001',
        task: 'nback',
        block: blockType,
        trial_number: trialIndex + 1,
        current_letter: currentLetter,
        nback1_letter: nback1 || '',
        nback2_letter: nback2 || '',
        is_match_trial: isMatchTrial ? 1 : 0,
        required_response: requiredResponse,
        key_pressed: keyPressed || '',
        score: score,
        match: match,
        miss: miss,
        false_alarm: falseAlarm,
        reaction_time: reactionTime || '',
        timestamp: new Date().toISOString()
      });
      
      console.log('N-back trial saved. Total trials:', nbackData.length);
    }
  };
}

// =============================================================================
// IGT TASK
// =============================================================================
let igtBank = IGT_INITIAL_BANK;
let igtTrialNumber = 0;
let igtFees = [];

function initIGTFees() {
  igtFees = [];
  // Create exactly 50 ones and 50 zeros (matching PsychoPy logic)
  const feeSet = [1, 0];
  for (let i = 0; i < IGT_TRIALS; i++) {
    igtFees.push(feeSet[i % 2]);
  }
  // Shuffle the array
  for (let i = igtFees.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [igtFees[i], igtFees[j]] = [igtFees[j], igtFees[i]];
  }
}

function makeIGTTrial() {
  igtTrialNumber++;
  const currentTrialNumber = igtTrialNumber;
  const feeOrNot = igtFees[igtTrialNumber - 1];
  
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      return `
        <div id="igt-container">
          <div id="igt-bank">Your money: $${igtBank}</div>
          <div style="display:flex;justify-content:center;gap:20px;margin-top:200px;">
            <div style="text-align:center;">
              <img src="stimuli/button_a.png" style="width:120px;height:120px;">
              <p style="color:#fff;font-size:18px;margin-top:10px;">Press 1</p>
            </div>
            <div style="text-align:center;">
              <img src="stimuli/button_b.png" style="width:120px;height:120px;">
              <p style="color:#fff;font-size:18px;margin-top:10px;">Press 2</p>
            </div>
            <div style="text-align:center;">
              <img src="stimuli/button_c.png" style="width:120px;height:120px;">
              <p style="color:#fff;font-size:18px;margin-top:10px;">Press 3</p>
            </div>
            <div style="text-align:center;">
              <img src="stimuli/button_d.png" style="width:120px;height:120px;">
              <p style="color:#fff;font-size:18px;margin-top:10px;">Press 4</p>
            </div>
          </div>
        </div>
      `;
    },
    choices: ['1', '2', '3', '4'],
    response_ends_trial: true,
    on_finish: function(data) {
      const buttonId = parseInt(data.response);
      const bankBefore = igtBank;
      
      let ab = (buttonId === 1 || buttonId === 2) ? 1 : 0;
      let win = ab === 1 ? 100 : 50;
      igtBank += win;
      
      let fee = 0;
      if (feeOrNot === 1) {
        fee = ab === 1 ? 250 : 50;
        igtBank -= fee;
      }
      
      console.log(`IGT Trial ${currentTrialNumber}: Deck ${buttonId}, Win: $${win}, Fee: $${fee}, Bank: $${bankBefore} -> $${igtBank}`);
      
      igtData.push({
        participant: participantInfo.participant || 'unknown',
        session: participantInfo.session || '001',
        task: 'igt',
        trial_number: currentTrialNumber,
        button_pressed: buttonId,
        ab: ab,
        fee_or_not: feeOrNot,
        bank_before: bankBefore,
        bank_after: igtBank,
        win: win,
        fee: fee,
        reaction_time: data.rt,
        timestamp: new Date().toISOString()
      });
      
      console.log('IGT trial saved. Total trials:', igtData.length);
    }
  };
}

function makeIGTFeedback() {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      const lastTrial = igtData[igtData.length - 1];
      return `
        <div class="text-screen centered">
          <h2 style="font-size:28px;font-weight:bold;margin-bottom:20px;">Trial ${lastTrial.trial_number} Results</h2>
          <p style="font-size:22px;">You selected Deck ${lastTrial.button_pressed}</p>
          <p style="font-size:22px;margin-top:20px;">Win: $${lastTrial.win}</p>
          ${lastTrial.fee > 0 ? `<p style="font-size:22px;">Fee: -$${lastTrial.fee}</p>` : ''}
          <p style="font-size:22px;margin-top:20px;">Net: $${lastTrial.win - lastTrial.fee}</p>
          <p style="font-size:22px;margin-top:20px;">Your money: $${igtBank}</p>
          <p style="font-size:22px;margin-top:30px;">Press SPACE to continue</p>
        </div>
      `;
    },
    choices: [' ']
  };
}

// =============================================================================
// TIMELINE
// =============================================================================
const timeline = [];

// Welcome screen
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="text-screen centered">
      <h2 style="font-size:28px;font-weight:bold;margin-bottom:20px;">Welcome</h2>
      <p style="font-size:22px;">Thank you for participating in this study.</p>
      <p style="font-size:22px;margin-top:20px;">You will complete two cognitive tasks:</p>
      <p style="font-size:22px;">1. N-Back Task (working memory)</p>
      <p style="font-size:22px;">2. Iowa Gambling Task (decision-making)</p>
      <p style="font-size:22px;margin-top:30px;">Press SPACE to continue</p>
    </div>`,
  choices: [' ']
});

// Participant ID form
timeline.push({
  type: jsPsychSurveyHtmlForm,
  preamble: '<h2 style="color:#000;font-size:22px;margin-bottom:20px;">Participant Information</h2>',
  html: `
    <div style="color:#000;font-size:22px;line-height:2.4;">
      <label>Participant ID:&nbsp;
        <input name="participant" type="text" required style="font-size:22px;width:200px;" />
      </label><br>
      <label>Initials:&nbsp;
        <input name="initials" type="text" required style="font-size:22px;width:100px;" />
      </label><br>
      <label>Session:&nbsp;
        <input name="session" type="text" value="001" required style="font-size:22px;width:100px;" />
      </label>
    </div>`,
  button_label: 'Continue',
  on_finish: function(data) {
    participantInfo = data.response;
    console.log('Participant info set:', participantInfo);
  }
});

// N-Back instructions
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="text-screen centered">
      <h2 style="font-size:28px;font-weight:bold;margin-bottom:20px;">N-Back Task Instructions</h2>
      <p style="font-size:22px;">You will see a sequence of letters appear on the screen.</p>
      <p style="font-size:22px;">Your task is to press the <strong>M</strong> key when the current letter matches the letter that appeared <strong>2 steps back</strong>.</p>
      <p style="font-size:22px;margin-top:20px;">For example:</p>
      <p style="font-size:22px;">If you see: A, B, <strong>A</strong>, C, B, <strong>C</strong></p>
      <p style="font-size:22px;">Press M when you see the second A (matches first A)</p>
      <p style="font-size:22px;">Press M when you see the second C (matches first C)</p>
      <p style="font-size:22px;margin-top:30px;">Press SPACE to begin the practice block</p>
    </div>`,
  choices: [' ']
});

// N-Back training block
nbackTrialCount = 0;
nback1 = null;
nback2 = null;
for (let i = 0; i < NBACK_TRIALS_PER_BLOCK; i++) {
  timeline.push(makeNbackTrial('training', i));
}
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: function() {
    const blockData = nbackData.filter(d => d.block === 'training');
    const totalMatchTrials = blockData.filter(d => d.is_match_trial === 1).length;
    const totalNonMatchTrials = blockData.filter(d => d.is_match_trial === 0).length;
    const matches = blockData.filter(d => d.match === 1).length;
    const misses = blockData.filter(d => d.miss === 1).length;
    const falseAlarms = blockData.filter(d => d.false_alarm === 1).length;
    
    const matchPerc = totalMatchTrials > 0 ? ((matches / totalMatchTrials) * 100).toFixed(1) : 0;
    const missPerc = totalMatchTrials > 0 ? ((misses / totalMatchTrials) * 100).toFixed(1) : 0;
    const falseAlarmPerc = totalNonMatchTrials > 0 ? ((falseAlarms / totalNonMatchTrials) * 100).toFixed(1) : 0;
    
    console.log(`training feedback - Match trials: ${totalMatchTrials}, Matches: ${matches}, Misses: ${misses}, False alarms: ${falseAlarms}`);
    
    return `
      <div class="text-screen centered">
        <p style="font-size:24px;font-weight:bold;margin-bottom:20px;">Practice Complete!</p>
        <p style="font-size:22px;">There were ${blockData.length} trials in this block</p>
        <p style="font-size:22px;">Total trials with a match: ${totalMatchTrials}</p>
        <p style="font-size:22px;">Total trials without a match: ${totalNonMatchTrials}</p>
        <p style="font-size:22px;">Number of correctly matched items: ${matches}</p>
        <p style="font-size:22px;">Number of missed items: ${misses}</p>
        <p style="font-size:22px;">Number of false alarms: ${falseAlarms}</p>
        <p style="font-size:22px;">Percentage correct matches: ${matchPerc}%</p>
        <p style="font-size:22px;">Percentage missed items: ${missPerc}%</p>
        <p style="font-size:22px;">Percentage false alarms: ${falseAlarmPerc}%</p>
        <p style="font-size:22px;margin-top:30px;">Press SPACE to continue</p>
      </div>`;
  },
  choices: [' ']
});

// N-Back Block 1
nbackTrialCount = 0;
nback1 = null;
nback2 = null;
for (let i = 0; i < NBACK_TRIALS_PER_BLOCK; i++) {
  timeline.push(makeNbackTrial('real1', i));
}
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: function() {
    const blockData = nbackData.filter(d => d.block === 'real1');
    const totalMatchTrials = blockData.filter(d => d.is_match_trial === 1).length;
    const totalNonMatchTrials = blockData.filter(d => d.is_match_trial === 0).length;
    const matches = blockData.filter(d => d.match === 1).length;
    const misses = blockData.filter(d => d.miss === 1).length;
    const falseAlarms = blockData.filter(d => d.false_alarm === 1).length;
    
    const matchPerc = totalMatchTrials > 0 ? ((matches / totalMatchTrials) * 100).toFixed(1) : 0;
    const missPerc = totalMatchTrials > 0 ? ((misses / totalMatchTrials) * 100).toFixed(1) : 0;
    const falseAlarmPerc = totalNonMatchTrials > 0 ? ((falseAlarms / totalNonMatchTrials) * 100).toFixed(1) : 0;
    
    console.log(`real1 feedback - Match trials: ${totalMatchTrials}, Matches: ${matches}, Misses: ${misses}, False alarms: ${falseAlarms}`);
    
    return `
      <div class="text-screen centered">
        <p style="font-size:24px;font-weight:bold;margin-bottom:20px;">Block 1 Complete!</p>
        <p style="font-size:22px;">There were ${blockData.length} trials in this block</p>
        <p style="font-size:22px;">Total trials with a match: ${totalMatchTrials}</p>
        <p style="font-size:22px;">Total trials without a match: ${totalNonMatchTrials}</p>
        <p style="font-size:22px;">Number of correctly matched items: ${matches}</p>
        <p style="font-size:22px;">Number of missed items: ${misses}</p>
        <p style="font-size:22px;">Number of false alarms: ${falseAlarms}</p>
        <p style="font-size:22px;">Percentage correct matches: ${matchPerc}%</p>
        <p style="font-size:22px;">Percentage missed items: ${missPerc}%</p>
        <p style="font-size:22px;">Percentage false alarms: ${falseAlarmPerc}%</p>
        <p style="font-size:22px;margin-top:30px;">Press SPACE to continue</p>
      </div>`;
  },
  choices: [' ']
});

// N-Back Block 2
nbackTrialCount = 0;
nback1 = null;
nback2 = null;
for (let i = 0; i < NBACK_TRIALS_PER_BLOCK; i++) {
  timeline.push(makeNbackTrial('real2', i));
}
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: function() {
    const blockData = nbackData.filter(d => d.block === 'real2');
    const totalMatchTrials = blockData.filter(d => d.is_match_trial === 1).length;
    const totalNonMatchTrials = blockData.filter(d => d.is_match_trial === 0).length;
    const matches = blockData.filter(d => d.match === 1).length;
    const misses = blockData.filter(d => d.miss === 1).length;
    const falseAlarms = blockData.filter(d => d.false_alarm === 1).length;
    
    const matchPerc = totalMatchTrials > 0 ? ((matches / totalMatchTrials) * 100).toFixed(1) : 0;
    const missPerc = totalMatchTrials > 0 ? ((misses / totalMatchTrials) * 100).toFixed(1) : 0;
    const falseAlarmPerc = totalNonMatchTrials > 0 ? ((falseAlarms / totalNonMatchTrials) * 100).toFixed(1) : 0;
    
    console.log(`real2 feedback - Match trials: ${totalMatchTrials}, Matches: ${matches}, Misses: ${misses}, False alarms: ${falseAlarms}`);
    
    return `
      <div class="text-screen centered">
        <p style="font-size:24px;font-weight:bold;margin-bottom:20px;">Block 2 Complete!</p>
        <p style="font-size:22px;">There were ${blockData.length} trials in this block</p>
        <p style="font-size:22px;">Total trials with a match: ${totalMatchTrials}</p>
        <p style="font-size:22px;">Total trials without a match: ${totalNonMatchTrials}</p>
        <p style="font-size:22px;">Number of correctly matched items: ${matches}</p>
        <p style="font-size:22px;">Number of missed items: ${misses}</p>
        <p style="font-size:22px;">Number of false alarms: ${falseAlarms}</p>
        <p style="font-size:22px;">Percentage correct matches: ${matchPerc}%</p>
        <p style="font-size:22px;">Percentage missed items: ${missPerc}%</p>
        <p style="font-size:22px;">Percentage false alarms: ${falseAlarmPerc}%</p>
        <p style="font-size:22px;margin-top:30px;">Press SPACE to continue</p>
      </div>`;
  },
  choices: [' ']
});

// Transition to IGT
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="text-screen centered">
      <h2 style="font-size:28px;font-weight:bold;margin-bottom:20px;">N-Back Task Complete!</h2>
      <p style="font-size:22px;">You completed ${nbackData.length} trials.</p>
      <p style="font-size:22px;margin-top:30px;">Next, you will complete the Iowa Gambling Task.</p>
      <p style="font-size:22px;">In this task, you will choose from 4 decks of cards.</p>
      <p style="font-size:22px;">Each deck gives different rewards and penalties.</p>
      <p style="font-size:22px;">Try to win as much money as possible!</p>
      <p style="font-size:22px;margin-top:30px;">Press SPACE to continue</p>
    </div>`,
  choices: [' ']
});

// IGT instructions
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="text-screen centered">
      <h2 style="font-size:28px;font-weight:bold;margin-bottom:20px;">Iowa Gambling Task Instructions</h2>
      <p style="font-size:22px;">You will see 4 decks of cards (A, B, C, D).</p>
      <p style="font-size:22px;">Click on a deck to select it.</p>
      <p style="font-size:22px;">Each deck gives you immediate rewards:</p>
      <p style="font-size:22px;">• Decks A & B: Win $100</p>
      <p style="font-size:22px;">• Decks C & D: Win $50</p>
      <p style="font-size:22px;margin-top:20px;">However, some decks also have penalties:</p>
      <p style="font-size:22px;">• Decks A & B: Large penalties ($250)</p>
      <p style="font-size:22px;">• Decks C & D: Small penalties ($50)</p>
      <p style="font-size:22px;margin-top:20px;">Your goal: Win as much money as possible!</p>
      <p style="font-size:22px;">Starting money: $${IGT_INITIAL_BANK}</p>
      <p style="font-size:22px;margin-top:30px;">Press SPACE to begin</p>
    </div>`,
  choices: [' '],
  on_start: function() {
    initIGTFees();
  }
});

// IGT trials
for (let i = 0; i < IGT_TRIALS; i++) {
  timeline.push(makeIGTTrial());
  timeline.push(makeIGTFeedback());
}

// End screen
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: function() {
    return `
    <div class="text-screen centered">
      <h2 style="font-size:28px;font-weight:bold;margin-bottom:20px;">All Tasks Complete!</h2>
      <p style="font-size:22px;">Thank you for participating.</p>
      <p style="font-size:22px;margin-top:20px;">N-Back trials: ${nbackData.length}</p>
      <p style="font-size:22px;">IGT trials: ${igtData.length}</p>
      <p style="font-size:22px;">Final IGT bank: $${igtBank}</p>
      <p style="font-size:22px;margin-top:30px;">Saving your data...</p>
      <p id="save-msg" style="font-size:22px;margin-top:20px;"></p>
    </div>`;
  },
  choices: "NO_KEYS",
  trial_duration: 100, // Auto-advance after 100ms to trigger on_finish
  on_load: function() {
    // Trigger Firebase save immediately when end screen loads
    const pid = participantInfo.participant || 'unknown';
    const session = participantInfo.session || '001';
    const timestamp = new Date().toISOString();
    
    console.log('=== Starting Firebase save ===');
    console.log('Participant ID:', pid);
    console.log('Session:', session);
    console.log('N-back trials:', nbackData.length);
    console.log('IGT trials:', igtData.length);
    console.log('Final IGT bank:', igtBank);
    console.log('Firebase db object:', db);
    
    // Log IGT data to check for undefined values
    console.log('IGT data sample:', igtData[0]);
    
    const el = document.getElementById('save-msg');
    
    // Save n-back data to Firebase
    console.log('Saving n-back data to Firebase...');
    db.collection('nback_data').add({
      participant_id: pid,
      session: session,
      timestamp: timestamp,
      trials: nbackData,
      total_trials: nbackData.length
    })
    .then(docRef => {
      console.log('✓ N-back data saved to Firebase with ID:', docRef.id);
      
      // Save IGT data to Firebase
      console.log('Saving IGT data to Firebase...');
      // Filter out undefined values from IGT data
      const cleanIGTData = igtData.map(trial => {
        const clean = {};
        for (const key in trial) {
          if (trial[key] !== undefined) {
            clean[key] = trial[key];
          }
        }
        return clean;
      });
      
      return db.collection('igt_data').add({
        participant_id: pid,
        session: session,
        timestamp: timestamp,
        trials: cleanIGTData,
        total_trials: cleanIGTData.length,
        final_bank: igtBank
      });
    })
    .then(docRef => {
      console.log('✓ IGT data saved to Firebase with ID:', docRef.id);
      console.log('✓ All data saved successfully to Firebase');
      if (el) {
        el.innerHTML = `<p style="font-size:22px;color:#007700;">Data saved successfully to Firebase. You may now close this tab. Thank you for participating!</p>`;
      }
    })
    .catch(error => {
      console.error('✗ Error saving data to Firebase:', error);
      if (el) {
        el.innerHTML = `<p style="font-size:22px;color:#cc0000;">Error saving data to Firebase: ${error.message}. Please contact the researcher.</p>`;
      }
    });
  }
});

// RUN EXPERIMENT
// =============================================================================
const jsPsych = initJsPsych({});

jsPsych.run(timeline);
</script>
